<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Username and Password Challenge Validated</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #e0f2fe, #dbeafe, #ede9fe);
        color: #111827;
      }
      .card {
        width: min(720px, 92%);
        padding: 2rem;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 12px 30px rgba(30, 41, 59, 0.2);
        border: 3px solid #2563eb;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
        font-weight: 800;
        color: #1d4ed8;
      }
      .ok {
        display: inline-block;
        margin: 0.25rem 0 1rem;
        padding: 0.45rem 0.7rem;
        border-radius: 8px;
        background: #dcfce7;
        color: #166534;
        font-weight: 700;
      }
      .path {
        margin: 0;
        font-weight: 700;
        color: #4f46e5;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Username and Password Challenge Validated</h1>
      <p class="ok">Authentication success.</p>
      <p>This page is shown only when the correct username and password are provided.</p>
      <p class="path">Path: /challenge/basic</p>
    </section>
  </body>
</html>
